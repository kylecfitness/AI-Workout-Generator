<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Workout Generator</title>
<link rel="icon" type="image/png" href="./logo.png">
</head>
<body>
<h1>AI Workout Generator (Updated Master Prompt)</h1>
<p>This is the updated HTML containing the improved master prompt logic. Replace your current index.html with this file.</p>

<script>
function generatePrompt(){

const level=document.getElementById("level")?.value
const goal=document.getElementById("goal")?.value
const intensity=document.getElementById("intensity")?.value
const bodyweight=document.getElementById("bodyweight")?.value
const experience=document.getElementById("experience")?.value
const days=document.getElementById("days")?.value
const split=document.getElementById("split")?.value
const length=document.getElementById("length")?.value
const equipment=document.getElementById("equipment")?.value
const injuries=document.getElementById("injuries")?.value
const cardio=document.getElementById("cardio")?.value
const nutritionGoal=document.getElementById("nutritionGoal")?.value
const macroGuide=document.getElementById("macroGuide")?.value
const supplements=document.getElementById("supplements")?.value
const supplementSug=document.getElementById("supplementSug")?.value

const prompt=`Create a professional 12-week adaptive training program based on the user information provided.

User Inputs:
Fitness Level: ${level}
Goal: ${goal}
Intensity: ${intensity}
Bodyweight: ${bodyweight}
Training Experience: ${experience}
Training Days Per Week: ${days}
Preferred Split: ${split}
Workout Length: ${length}
Available Equipment: ${equipment}
Injuries or Limitations: ${injuries}
Cardio Preference: ${cardio}

Nutrition Goal: ${nutritionGoal}
Macro Guidance Requested: ${macroGuide}

Current Supplements: ${supplements}
Suggested Supplements Requested: ${supplementSug}

PROGRAM REQUIREMENTS

Design a fully structured 12-week training program that includes:
• Weekly training split
• Exercise selection appropriate for experience level
• Progressive overload strategy
• Planned deload weeks
• Fatigue management strategies
• Exercise substitutions if equipment is limited
• Cardio integration based on preference
• Recovery recommendations

Structure the program in clear phases if appropriate.

WORKOUT STRUCTURE

For each workout day include:
Exercise Name
Sets
Reps
Rest Time
Optional Notes

FORM GUIDANCE

Include brief form guidance for major compound exercises such as squats, deadlifts, bench press, overhead press, and rows.

NUTRITION GUIDANCE

If a nutrition goal is selected:
Estimate daily calorie targets using the user's bodyweight and training goal.
Provide macro ranges for protein, carbohydrates, and fats.
Adjust calories for deficit, maintenance, or surplus.

SUPPLEMENT GUIDANCE

Review current supplements first.
If supplement suggestions are requested, provide a short section recommending useful supplements.

OUTPUT FORMAT

Format the final output like a clean printable training document.

Include:
Program Title
User Overview
Weekly Training Split
Full 12-Week Program
Exercise Notes
Nutrition Section (if requested)
Supplement Section (if requested)

At the end include a short line stating that the program can be printed or saved as a PDF.

IMPORTANT RULES

Only generate the workout program and related sections.

Do NOT discuss:
• the generator
• the website
• improving the tool
• adding features

Do NOT explain how the program was generated.`

return prompt
}
</script>

</body>
</html>
